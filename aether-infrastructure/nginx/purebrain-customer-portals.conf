# PureBrain Customer Portal Routes
# Generated by subdomain_router.py — DO NOT EDIT MANUALLY
# Last updated: 2026-03-04

# app.purebrain.ai → redirect to portal.purebrain.ai
server {
    listen 8099;
    server_name app.purebrain.ai;
    return 301 https://portal.purebrain.ai$request_uri;
}

# Customer: keenjared.purebrain.ai → https://keenjared.ai-civ.com
server {
    listen 8099;
    server_name keenjared.purebrain.ai;
    resolver 1.1.1.1 8.8.8.8 valid=60s ipv6=off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        set $backend "https://keenjared.ai-civ.com";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Purebrain-Subdomain "keenjared";
        proxy_buffering off;
        proxy_cache off;
    }
}

# Catch-all for unknown *.purebrain.ai subdomains
server {
    listen 8099 default_server;
    server_name _;

    location / {
        default_type text/html;
        return 404 '<html><head><title>PureBrain Portal</title></head><body style="background:#080a12;color:white;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0"><div style="text-align:center"><h1 style="color:#2a93c1">PUREBR<span style="color:#f1420b">AI</span>N<span style="color:#888">.ai</span></h1><p>Portal not found.</p><p style="color:#888">If you recently signed up, your portal may still be initializing.<br>Try again in a few minutes.</p></div></body></html>';
    }
}
