<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PureBrain - Your Brain. Your AI. Actual Intelligence. The AI That Matters Most!</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d1a;
    --surface: #13132b;
    --surface2: #1a1a38;
    --border: #2a2a55;
    --accent: #7c6af7;
    --accent2: #4ecca3;
    --text: #e0e0f0;
    --text-dim: #8080aa;
    --online: #4ecca3;
    --offline: #ff6b6b;
    --font-mono: 'Courier New', 'Lucida Console', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
  }

  /* -- Header -- */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; }
  .subtitle { color: var(--text-dim); font-size: 0.75rem; }
  .status-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75rem; color: var(--text-dim);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--offline); transition: background 0.3s;
  }
  .status-dot.online { background: var(--online); box-shadow: 0 0 6px var(--online); }

  /* -- Auth overlay -- */
  #auth-overlay {
    position: fixed; inset: 0;
    background: rgba(13,13,26,0.95);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 24px;
    width: 340px;
    max-width: 90vw;
    text-align: center;
  }
  .auth-box h2 { font-size: 1.3rem; color: var(--accent); margin-bottom: 8px; }
  .auth-box p { color: var(--text-dim); font-size: 0.82rem; margin-bottom: 20px; }
  .auth-box input {
    width: 100%; padding: 10px 12px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.88rem;
    margin-bottom: 12px; outline: none;
    font-family: var(--font-mono);
  }
  .auth-box input:focus { border-color: var(--accent); }
  .auth-box button {
    width: 100%; padding: 10px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 6px;
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
  }
  .auth-box button:hover { opacity: 0.85; }
  .auth-error { color: var(--offline); font-size: 0.78rem; margin-top: 8px; min-height: 1em; }

  /* -- Layout -- */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* -- Sidebar (desktop) -- */
  .sidebar {
    width: 140px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 12px 0;
  }
  .nav-item {
    padding: 10px 16px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 0.85rem;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .nav-item:hover { color: var(--text); background: rgba(124,106,247,0.08); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(124,106,247,0.12); }
  .nav-icon { margin-right: 6px; }

  /* -- Mobile bottom tabs -- */
  .mobile-tabs {
    display: none;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .mobile-tabs .tab-bar {
    display: flex;
  }
  .mobile-tabs .tab-item {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 0.72rem;
    border-top: 2px solid transparent;
    user-select: none;
  }
  .mobile-tabs .tab-item.active { color: var(--accent); border-top-color: var(--accent); }
  .mobile-tabs .tab-icon { display: block; font-size: 1.1rem; margin-bottom: 2px; }

  /* -- Content panels -- */
  .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  .panel { display: none; flex: 1; overflow: hidden; flex-direction: column; padding: 12px; }
  .panel.active { display: flex; }

  /* -- Terminal panel -- */
  .terminal-bar {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    font-size: 0.72rem; color: var(--text-dim);
    flex-shrink: 0;
  }
  .terminal-bar .dot { width:8px; height:8px; border-radius:50%; }
  .dot-red { background: #ff5f56; }
  .dot-yellow { background: #ffbd2e; }
  .dot-green { background: #27c93f; }
  .ws-indicator { margin-left: auto; font-size: 0.7rem; }
  .ws-indicator.connected { color: var(--online); }
  .ws-indicator.disconnected { color: var(--offline); }

  #terminal-output {
    flex: 1;
    background: #0a0a14;
    border: 1px solid var(--border);
    border-top: none;
    padding: 10px;
    overflow-y: auto;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    line-height: 1.45;
    color: #c0f0d0;
    white-space: pre-wrap;
    word-break: break-all;
    -webkit-overflow-scrolling: touch;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .term-input-bar {
    display: flex; gap: 8px; padding-top: 8px;
    flex-shrink: 0;
  }
  .term-input-bar input {
    flex: 1; padding: 8px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 0.85rem; outline: none;
    font-family: var(--font-mono);
  }
  .term-input-bar input:focus { border-color: var(--accent); }
  .term-input-bar button {
    padding: 8px 16px;
    background: var(--accent2); color: #fff;
    border: none; border-radius: 6px;
    font-size: 0.85rem; font-weight: 600; cursor: pointer;
  }
  .term-input-bar button:hover { opacity: 0.85; }

  /* -- Chat panel -- */
  #chat-messages {
    flex: 1; overflow-y: auto;
    padding: 8px 0; display: flex; flex-direction: column; gap: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .msg { display: flex; flex-direction: column; max-width: 85%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }
  .msg-bubble {
    padding: 8px 12px; border-radius: 14px;
    font-size: 0.85rem; line-height: 1.5;
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .msg-bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; font-family: var(--font-mono); font-size: 0.78rem; }
  .msg-meta { font-size: 0.68rem; color: var(--text-dim); margin: 2px 4px; }
  .chat-loading { color: var(--text-dim); font-size: 0.8rem; text-align: center; padding: 20px; }

  .chat-input-bar {
    display: flex; gap: 8px; padding-top: 10px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-input-bar input {
    flex: 1; padding: 10px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 0.88rem; outline: none;
  }
  .chat-input-bar input:focus { border-color: var(--accent); }
  .chat-input-bar button {
    padding: 10px 18px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
  }
  .chat-input-bar button:hover { opacity: 0.85; }
  .chat-input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* -- Status panel -- */
  .status-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px; padding: 4px 0;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 14px;
  }
  .stat-card .label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .stat-card .value { font-size: 1rem; font-weight: 600; color: var(--text); }
  .stat-card .value.ok { color: var(--online); }
  .stat-card .value.bad { color: var(--offline); }
  .stat-card .value.dim { color: var(--text-dim); }
  .status-refresh { margin-top: 12px; color: var(--text-dim); font-size: 0.75rem; }
  .status-refresh button {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); padding: 4px 10px; border-radius: 4px;
    cursor: pointer; font-size: 0.75rem; margin-left: 8px;
  }
  .status-refresh button:hover { border-color: var(--accent); color: var(--accent); }

  /* -- Mobile responsive -- */
  @media (max-width: 600px) {
    .sidebar { display: none; }
    .mobile-tabs { display: block; }
    header { padding: 6px 12px; }
    .logo { font-size: 1rem; }
    .subtitle { display: none; }
    .panel { padding: 8px; }
    .msg { max-width: 92%; }
    .terminal-bar { padding: 4px 8px; font-size: 0.68rem; }
    #terminal-output { font-size: 0.7rem; padding: 8px; }
    .term-input-bar input, .chat-input-bar input { font-size: 16px; } /* prevents iOS zoom */
    .status-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-card { padding: 10px; }
  }
</style>
</head>
<body>

<!-- Auth overlay -->
<div id="auth-overlay">
  <div class="auth-box">
    <h2>Witness</h2>
    <p>AI Civilization Portal</p>
    <input type="password" id="token-input" placeholder="Bearer token..." autocomplete="off">
    <button id="auth-btn">Connect</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<header>
  <div class="header-left">
    <span class="logo">Witness</span>
    <span class="subtitle">AI Civilization</span>
  </div>
  <div class="status-badge">
    <div class="status-dot" id="conn-dot"></div>
    <span id="conn-label">Connecting</span>
  </div>
</header>

<div class="main">
  <nav class="sidebar">
    <div class="nav-item active" data-panel="terminal"><span class="nav-icon">></span>Terminal</div>
    <div class="nav-item" data-panel="chat"><span class="nav-icon">~</span>Chat</div>
    <div class="nav-item" data-panel="status"><span class="nav-icon">*</span>Status</div>
  </nav>

  <div class="content">

    <!-- Terminal -->
    <div class="panel active" id="panel-terminal">
      <div class="terminal-bar">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
        <span style="margin-left:8px; font-size:0.7rem;">witness-primary</span>
        <span class="ws-indicator disconnected" id="ws-status">disconnected</span>
      </div>
      <div id="terminal-output">Connecting to terminal stream...</div>
      <div class="term-input-bar">
        <input type="text" id="term-input" placeholder="Send to terminal..." autocomplete="off">
        <button id="term-send-btn">Send</button>
      </div>
    </div>

    <!-- Chat -->
    <div class="panel" id="panel-chat">
      <div id="chat-messages"><div class="chat-loading">Loading chat history...</div></div>
      <div class="chat-input-bar">
        <input type="text" id="chat-input" placeholder="Message Witness..." autocomplete="off">
        <button id="send-btn">Send</button>
      </div>
    </div>

    <!-- Status -->
    <div class="panel" id="panel-status">
      <div class="status-grid" id="status-grid">
        <div class="stat-card"><div class="label">Loading...</div><div class="value dim">-</div></div>
      </div>
      <div class="status-refresh">
        Auto-refresh every 30s
        <button id="refresh-btn">Refresh Now</button>
      </div>
    </div>

  </div>
</div>

<!-- Mobile bottom tabs -->
<div class="mobile-tabs">
  <div class="tab-bar">
    <div class="tab-item active" data-panel="terminal">
      <span class="tab-icon">></span>Terminal
    </div>
    <div class="tab-item" data-panel="chat">
      <span class="tab-icon">~</span>Chat
    </div>
    <div class="tab-item" data-panel="status">
      <span class="tab-icon">*</span>Status
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // -- State --
  let token = '';
  let termWs = null;
  let chatWs = null;
  let wsReconnectTimeout = null;
  let chatWsReconnectTimeout = null;
  let statusInterval = null;
  let activePanel = 'terminal';
  let chatLoaded = false;
  let knownMsgIds = new Set();

  // -- Auth --
  var overlay = document.getElementById('auth-overlay');
  var tokenInput = document.getElementById('token-input');
  var authBtn = document.getElementById('auth-btn');
  var authError = document.getElementById('auth-error');

  // Check URL params for magic link token
  var urlParams = new URLSearchParams(window.location.search);
  var urlToken = urlParams.get('token');
  if (urlToken) {
    tokenInput.value = urlToken;
    history.replaceState(null, '', window.location.pathname);
  }

  function doAuth() {
    var t = tokenInput.value.trim();
    if (!t) { authError.textContent = 'Enter your token.'; return; }
    fetch('/api/status', { headers: { 'Authorization': 'Bearer ' + t } })
      .then(function(r) {
        if (r.status === 401) throw new Error('Invalid token');
        if (!r.ok) throw new Error('Server error ' + r.status);
        return r.json();
      })
      .then(function() {
        token = t;
        localStorage.setItem('portal_token', t);
        overlay.style.display = 'none';
        boot();
      })
      .catch(function(e) { authError.textContent = e.message; });
  }

  authBtn.addEventListener('click', doAuth);
  tokenInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doAuth(); });

  var saved = localStorage.getItem('portal_token');
  if (saved) {
    tokenInput.value = saved;
    if (urlToken) {
      token = urlToken;
      overlay.style.display = 'none';
      boot();
    } else {
      doAuth();
    }
  } else if (urlToken) {
    doAuth();
  }

  // -- Navigation --
  function switchPanel(panel) {
    if (panel === activePanel) return;
    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });

    // Activate sidebar + mobile tab
    document.querySelectorAll('[data-panel="' + panel + '"]').forEach(function(el) {
      el.classList.add('active');
    });
    document.getElementById('panel-' + panel).classList.add('active');
    activePanel = panel;

    if (panel === 'status') loadStatus();
    if (panel === 'chat' && !chatLoaded) loadChatHistory();
    if (panel === 'terminal' && !termWs) connectTerminalWS();
  }

  document.querySelectorAll('.nav-item').forEach(function(item) {
    item.addEventListener('click', function() { switchPanel(item.dataset.panel); });
  });
  document.querySelectorAll('.tab-item').forEach(function(item) {
    item.addEventListener('click', function() { switchPanel(item.dataset.panel); });
  });

  // -- Boot --
  function boot() {
    connectTerminalWS();
    connectChatWS();
    loadStatus();
    statusInterval = setInterval(loadStatus, 30000);
    document.getElementById('refresh-btn').addEventListener('click', loadStatus);
    document.getElementById('send-btn').addEventListener('click', sendChat);
    document.getElementById('chat-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });
    document.getElementById('term-send-btn').addEventListener('click', sendTerminal);
    document.getElementById('term-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTerminal(); }
    });
  }

  // -- Terminal WebSocket --
  var termEl = document.getElementById('terminal-output');
  var wsStatusEl = document.getElementById('ws-status');
  var connDot = document.getElementById('conn-dot');
  var connLabel = document.getElementById('conn-label');

  function setConnected(connected) {
    wsStatusEl.textContent = connected ? 'live' : 'disconnected';
    wsStatusEl.className = 'ws-indicator ' + (connected ? 'connected' : 'disconnected');
    connDot.className = 'status-dot ' + (connected ? 'online' : '');
    connLabel.textContent = connected ? 'Online' : 'Offline';
  }

  function connectTerminalWS() {
    if (termWs) termWs.close();
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    termWs = new WebSocket(proto + '//' + location.host + '/ws/terminal?token=' + encodeURIComponent(token));
    termWs.onopen = function() {
      setConnected(true);
      if (wsReconnectTimeout) { clearTimeout(wsReconnectTimeout); wsReconnectTimeout = null; }
    };
    termWs.onmessage = function(e) {
      // Trim trailing empty lines from tmux capture
      var lines = e.data.replace(/\s+$/, '').split('\n');
      // Remove trailing empty lines
      while (lines.length > 0 && lines[lines.length - 1].trim() === '') {
        lines.pop();
      }
      termEl.textContent = lines.join('\n');
      termEl.scrollTop = termEl.scrollHeight;
    };
    termWs.onclose = function() {
      setConnected(false);
      termWs = null;
      wsReconnectTimeout = setTimeout(function() { if (token) connectTerminalWS(); }, 3000);
    };
    termWs.onerror = function() { setConnected(false); };
  }

  // -- Terminal Send --
  function sendTerminal() {
    var input = document.getElementById('term-input');
    var msg = input.value.trim();
    if (!msg) return;
    input.value = '';

    fetch('/api/chat/send', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    })
    .then(function(r) { return r.json(); })
    .catch(function() {});

    input.focus();
  }

  // -- Chat History --
  var chatMessages = document.getElementById('chat-messages');
  var chatInput = document.getElementById('chat-input');
  var sendBtn = document.getElementById('send-btn');

  function formatTime(ts) {
    var d = new Date(ts * 1000);
    var h = d.getHours();
    var m = d.getMinutes();
    var ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    return h + ':' + (m < 10 ? '0' : '') + m + ampm;
  }

  function addMessage(text, role, ts, id) {
    // Deduplicate
    var msgId = id || ('local-' + Date.now() + '-' + Math.random());
    if (knownMsgIds.has(msgId)) return;
    knownMsgIds.add(msgId);

    // Truncate very long messages for display
    var displayText = text;
    if (displayText.length > 4000) {
      displayText = displayText.substring(0, 4000) + '\n\n... [truncated]';
    }

    var timeStr = ts ? formatTime(ts) : formatTime(Math.floor(Date.now() / 1000));
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    div.setAttribute('data-id', msgId);

    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = displayText;

    var meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.textContent = (role === 'user' ? 'Corey' : 'Witness') + ' - ' + timeStr;

    div.appendChild(bubble);
    div.appendChild(meta);
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function loadChatHistory() {
    chatLoaded = true;
    chatMessages.innerHTML = '<div class="chat-loading">Loading history...</div>';

    fetch('/api/chat/history?last=100', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      chatMessages.innerHTML = '';
      if (data.messages && data.messages.length > 0) {
        data.messages.forEach(function(m) {
          addMessage(m.text, m.role, m.timestamp, m.id);
        });
      } else {
        chatMessages.innerHTML = '<div class="chat-loading">No messages yet. Start a conversation!</div>';
      }
    })
    .catch(function(e) {
      chatMessages.innerHTML = '<div class="chat-loading">Error loading history: ' + e.message + '</div>';
    });
  }

  // -- Chat WebSocket (real-time new messages) --
  function connectChatWS() {
    if (chatWs) chatWs.close();
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    chatWs = new WebSocket(proto + '//' + location.host + '/ws/chat?token=' + encodeURIComponent(token));
    chatWs.onopen = function() {
      if (chatWsReconnectTimeout) { clearTimeout(chatWsReconnectTimeout); chatWsReconnectTimeout = null; }
    };
    chatWs.onmessage = function(e) {
      try {
        var msg = JSON.parse(e.data);
        // Remove "no messages" placeholder if present
        var placeholder = chatMessages.querySelector('.chat-loading');
        if (placeholder) placeholder.remove();
        addMessage(msg.text, msg.role, msg.timestamp, msg.id);
      } catch(err) {}
    };
    chatWs.onclose = function() {
      chatWs = null;
      chatWsReconnectTimeout = setTimeout(function() { if (token) connectChatWS(); }, 3000);
    };
    chatWs.onerror = function() {};
  }

  // -- Chat Send --
  function sendChat() {
    var msg = chatInput.value.trim();
    if (!msg || sendBtn.disabled) return;
    chatInput.value = '';
    sendBtn.disabled = true;

    // Optimistic local display
    addMessage(msg, 'user', Math.floor(Date.now() / 1000), 'local-' + Date.now());

    fetch('/api/chat/send', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) {
        addMessage('Error: ' + data.error, 'assistant', null, 'err-' + Date.now());
      }
    })
    .catch(function(e) {
      addMessage('Network error: ' + e.message, 'assistant', null, 'err-' + Date.now());
    })
    .finally(function() { sendBtn.disabled = false; chatInput.focus(); });
  }

  // -- Status --
  var statusGrid = document.getElementById('status-grid');

  function fmtUptime(s) {
    var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm ' + (s % 60) + 's';
  }

  function statusCard(label, value, cls) {
    return '<div class="stat-card"><div class="label">' + label + '</div><div class="value ' + (cls||'') + '">' + value + '</div></div>';
  }

  function loadStatus() {
    fetch('/api/status', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        statusGrid.innerHTML =
          statusCard('CIV Name', d.civ || '-') +
          statusCard('Uptime', fmtUptime(d.uptime || 0)) +
          statusCard('tmux', d.tmux_alive ? 'Active' : 'Dead', d.tmux_alive ? 'ok' : 'bad') +
          statusCard('Claude', d.claude_running ? 'Running' : 'Stopped', d.claude_running ? 'ok' : 'bad') +
          statusCard('TG Bot', d.tg_bot_running ? 'Running' : 'Stopped', d.tg_bot_running ? 'ok' : 'bad') +
          statusCard('Session', d.tmux_session || '-', 'dim');
      })
      .catch(function(e) {
        statusGrid.innerHTML = statusCard('Error', e.message, 'bad');
      });
  }

})();
</script>
</body>
</html>
